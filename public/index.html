<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RickClaw WebChat</title>
  <style>
     :root {
       --bg: #0d1117;
       --surface: #161b22;
       --surface-hover: #1c2333;
       --border: #30363d;
       --text: #e6edf3;
       --text-muted: #8b949e;
       --accent: #58a6ff;
       --accent-glow: rgba(88, 166, 255, 0.15);
       --user-bg: #1f3a5f;
       --bot-bg: #1c2333;
       --success: #3fb950;
       --error: #f85149;
       --radius: 12px;
       --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
     }

     * { box-sizing: border-box; margin: 0; padding: 0; }

     body {
       font-family: var(--font);
       background: var(--bg);
       color: var(--text);
       height: 100vh;
       display: flex;
       flex-direction: column;
     }

     /* Auth Screen */
     #auth-box {
       display: flex;
       flex-direction: column;
       align-items: center;
       justify-content: center;
       height: 100vh;
       gap: 12px;
     }
     #auth-box h2 {
       font-size: 24px;
       font-weight: 600;
       margin-bottom: 8px;
       color: var(--accent);
     }
     #auth-box input {
       width: 280px;
       padding: 12px 16px;
       font-size: 15px;
       background: var(--surface);
       border: 1px solid var(--border);
       border-radius: 8px;
       color: var(--text);
       outline: none;
       transition: border-color 0.2s;
     }
     #auth-box input:focus { border-color: var(--accent); }
     #auth-box button {
       width: 280px;
       padding: 12px;
       font-size: 15px;
       font-weight: 600;
       background: var(--accent);
       color: #fff;
       border: none;
       border-radius: 8px;
       cursor: pointer;
       transition: opacity 0.2s;
     }
     #auth-box button:hover { opacity: 0.85; }
     #error { color: var(--error); font-size: 14px; margin-top: 4px; }

     /* Chat Container */
     #chat-container {
       display: none;
       flex-direction: column;
       height: 100vh;
     }

     /* Header */
     #header {
       background: var(--surface);
       border-bottom: 1px solid var(--border);
       padding: 14px 20px;
       display: flex;
       align-items: center;
       gap: 10px;
       flex-shrink: 0;
     }
     #header .dot {
       width: 10px; height: 10px;
       background: var(--success);
       border-radius: 50%;
       animation: pulse 2s ease-in-out infinite;
     }
     @keyframes pulse {
       0%, 100% { opacity: 1; }
       50% { opacity: 0.4; }
     }
     #header span { font-weight: 600; font-size: 16px; }
     #header .subtitle { font-size: 12px; color: var(--text-muted); margin-left: auto; }

     /* Messages Area */
     #chat {
       flex: 1;
       overflow-y: auto;
       padding: 20px;
       display: flex;
       flex-direction: column;
       gap: 8px;
       scrollbar-width: thin;
       scrollbar-color: var(--border) transparent;
     }

     .msg-wrapper {
       display: flex;
       align-items: flex-start;
       gap: 6px;
       max-width: 85%;
     }
     .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; }
     .msg-wrapper.bot { align-self: flex-start; }

     .msg {
       padding: 10px 14px;
       border-radius: var(--radius);
       font-size: 14px;
       line-height: 1.5;
       white-space: pre-wrap;
       word-break: break-word;
     }
     .msg-wrapper.user .msg { background: var(--user-bg); border-bottom-right-radius: 4px; }
     .msg-wrapper.bot .msg { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

     /* Copy Button */
     .copy-btn {
       background: none;
       border: none;
       color: var(--text-muted);
       cursor: pointer;
       padding: 4px;
       font-size: 14px;
       border-radius: 4px;
       opacity: 0;
       transition: opacity 0.2s, color 0.2s, background 0.2s;
       flex-shrink: 0;
       margin-top: 4px;
     }
     .msg-wrapper:hover .copy-btn { opacity: 1; }
     .copy-btn:hover { color: var(--accent); background: var(--accent-glow); }
     .copy-btn.copied { color: var(--success); opacity: 1; }

     /* Input Area */
     #input-box {
       background: var(--surface);
       border-top: 1px solid var(--border);
       padding: 14px 20px;
       display: flex;
       align-items: center;
       gap: 10px;
       flex-shrink: 0;
     }
     #msg {
       flex: 1;
       padding: 12px 16px;
       font-size: 15px;
       background: var(--bg);
       border: 1px solid var(--border);
       border-radius: 8px;
       color: var(--text);
       outline: none;
       transition: border-color 0.2s;
       font-family: var(--font);
     }
     #msg:focus { border-color: var(--accent); }
     #input-box button {
       padding: 10px 14px;
       font-size: 18px;
       background: transparent;
       border: 1px solid var(--border);
       border-radius: 8px;
       color: var(--text-muted);
       cursor: pointer;
       transition: color 0.2s, border-color 0.2s, background 0.2s;
     }
     #input-box button:hover {
       color: var(--accent);
       border-color: var(--accent);
       background: var(--accent-glow);
     }
     #send-btn { color: var(--accent) !important; border-color: var(--accent) !important; }
     #send-btn:hover { background: var(--accent) !important; color: #fff !important; }

     /* Modal Custos */
     #cost-modal {
       display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
       background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
     }
     .modal-content {
       background: var(--surface); padding: 24px; border-radius: var(--radius); width: 340px;
       border: 1px solid var(--border); color: var(--text);
     }
     .modal-content h3 { color: var(--accent); margin-bottom: 16px; }
     .cost-item { margin-bottom: 12px; }
     .cost-item span { color: var(--text-muted); font-size: 14px; }
     .cost-item div { font-size: 18px; font-weight: bold; }
     .provider-list { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; max-height: 150px; overflow-y: auto; }
     .provider-list .pill { background: var(--bg); padding: 6px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 6px; display: flex; justify-content: space-between; }
     #close-modal { margin-top: 20px; width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
     #close-modal:hover { opacity: 0.85; }
  </style>
</head>
<body>
  
  <div id="auth-box">
     <h2>🦪 RickClaw</h2>
     <input type="text" id="username" placeholder="Usuário">
     <input type="password" id="password" placeholder="Senha" autofocus>
     <button onclick="login()">Entrar</button>
     <div id="error"></div>
  </div>

  <div id="chat-container">
     <div id="header">
        <div class="dot"></div>
        <span>RickClaw</span>
        <span class="subtitle">Agente Local</span>
        <button id="cost-btn" style="border:none;background:transparent;cursor:pointer;font-size:20px;margin-left:10px" onclick="showCosts()" title="Ver Custos">💰</button>
        <button id="clear-btn" style="border:none;background:transparent;cursor:pointer;font-size:20px" onclick="clearChat()" title="Limpar Conversa (Novo /new)">🧹</button>
        <button style="border:none;background:transparent;cursor:pointer;font-size:20px" onclick="showPasswordModal()" title="Alterar Senha">🔑</button>
     </div>
     <div id="chat"></div>
     <div id="input-box">
        <input type="file" id="file" style="display:none;" onchange="uploadFile()">
        <button onclick="document.getElementById('file').click()" title="Anexar arquivo">📎</button>
        <input type="text" id="msg" placeholder="Digite uma mensagem..." onkeyup="if(event.key === 'Enter') sendMsg()">
        <button id="send-btn" onclick="sendMsg()" title="Enviar">➤</button>
     </div>
  </div>

  <div id="cost-modal">
    <div class="modal-content">
      <h3>📊 Custos Estimados</h3>
      <div class="cost-item">
        <span>Hoje</span>
        <div id="cost-today">...</div>
      </div>
      <div class="cost-item">
        <span>Este Mês</span>
        <div id="cost-month">...</div>
      </div>
      <div class="provider-list" id="cost-providers"></div>
      <div style="font-size: 12px; color: var(--text-muted); margin-top: 12px;" id="cost-iterations"></div>
      <button id="close-modal" onclick="document.getElementById('cost-modal').style.display='none'">Fechar</button>
    </div>
  </div>

  <div id="pw-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:100;">
    <div class="modal-content" style="width: 320px;">
      <h3 style="color: var(--accent); margin-bottom: 16px;">🔑 Alterar Senha</h3>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <input type="password" id="pw-current" placeholder="Senha atual"
          style="padding:10px 14px; font-size:14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); outline:none;">
        <input type="password" id="pw-new" placeholder="Nova senha (min. 6 caracteres)"
          style="padding:10px 14px; font-size:14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); outline:none;">
        <input type="password" id="pw-confirm" placeholder="Confirmar nova senha"
          style="padding:10px 14px; font-size:14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); outline:none;">
        <div id="pw-feedback" style="font-size:13px; min-height:18px;"></div>
        <button onclick="changePassword()" style="padding:10px; font-size:14px; font-weight:600; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer;">Alterar</button>
        <button onclick="closePasswordModal()" style="padding:10px; font-size:14px; background:transparent; color:var(--text-muted); border:1px solid var(--border); border-radius:8px; cursor:pointer;">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    let token = null;

    function escapeHtml(str) {
       return str
         .replace(/&/g, '&amp;')
         .replace(/</g, '&lt;')
         .replace(/>/g, '&gt;')
         .replace(/"/g, '&quot;')
         .replace(/'/g, '&#039;');
    }

    // Simple Markdown-like formatter (escapes HTML first to prevent XSS)
    function formatMessage(text) {
       if (!text) return '';
       text = escapeHtml(text);
       // Bold
       text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
       // Inline Code
       text = text.replace(/`(.*?)`/g, '<code>$1</code>');
       // Bullet points
       text = text.replace(/^- (.*)/gm, '• $1');
       return text;
    }

    async function clearChat() {
       if (!confirm("Deseja realmente iniciar uma nova conversa? O histórico atual será arquivado.")) return;
       
       const res = await fetch('/api/chat/clear', {
          method: 'POST',
          headers: {
             'Content-Type': 'application/json',
             'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ uid: 'admin-web' })
       });

       if (res.ok) {
          document.getElementById('chat').innerHTML = '';
          appendMsg("✨ **Sessão reiniciada.** Como posso ajudar agora?", 'bot');
       }
    }

    async function login() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const res = await fetch('/api/auth', {
         method: 'POST',
         headers: {'Content-Type': 'application/json'},
         body: JSON.stringify({username: u, password: p})
      });
      const data = await res.json();
      if (res.ok) {
         token = data.token;
         document.getElementById('auth-box').style.display = 'none';
         document.getElementById('chat-container').style.display = 'flex';
         document.getElementById('msg').focus();
      } else {
         document.getElementById('error').innerText = data.error;
      }
    }

    async function showCosts() {
      document.getElementById('cost-modal').style.display = 'flex';
      try {
        const res = await fetch('/api/costs', {
           headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        
        const formatBRL = (usd) => ` (~R$ ${(usd * data.rate).toFixed(2)})`;
        const formatUSD = (usd) => `$${usd.toFixed(4)}`;

        document.getElementById('cost-today').innerText = formatUSD(data.todayUsd) + formatBRL(data.todayUsd);
        document.getElementById('cost-month').innerText = formatUSD(data.monthUsd) + formatBRL(data.monthUsd);
        document.getElementById('cost-iterations').innerText = `Iterações hoje: ${data.iterationsToday} chamadas`;
        
        const provEl = document.getElementById('cost-providers');
        provEl.innerHTML = '';
        data.details.forEach(d => {
           provEl.innerHTML += `<div class="pill"><span>${d.provider} (${d.source})</span> <strong>${formatUSD(d.total_cost)}</strong></div>`;
        });
      } catch (e) {
        console.error("Erro ao buscar custos", e);
      }
    }

    function createCopyButton(textContent) {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.title = 'Copiar';
      btn.innerHTML = '📋';
      btn.onclick = async () => {
        try {
          await navigator.clipboard.writeText(textContent);
          btn.innerHTML = '✓';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.innerHTML = '📋';
            btn.classList.remove('copied');
          }, 1500);
        } catch {
          // Fallback for non-HTTPS
          const ta = document.createElement('textarea');
          ta.value = textContent;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          btn.innerHTML = '✓';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.innerHTML = '📋';
            btn.classList.remove('copied');
          }, 1500);
        }
      };
      return btn;
    }

    function appendMsg(text, sender) {
       const wrapper = document.createElement('div');
       wrapper.className = 'msg-wrapper ' + sender;

       const msgEl = document.createElement('div');
       msgEl.className = 'msg';
       msgEl.innerHTML = formatMessage(text);

       const copyBtn = createCopyButton(text);

       wrapper.appendChild(msgEl);
       wrapper.appendChild(copyBtn);
       document.getElementById('chat').appendChild(wrapper);
       document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

       return msgEl;
    }

    async function sendMsg() {
      const input = document.getElementById('msg');
      const text = input.value.trim();
      if (!text) return;
      
      // Local check for /new
      if (text.toLowerCase() === '/new') {
          input.value = '';
          return clearChat();
      }

      input.value = '';

      appendMsg(text, 'user');

      // Create bot message wrapper with copy button
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper bot';
      const botMsgEl = document.createElement('div');
      botMsgEl.className = 'msg';
      const copyBtn = createCopyButton('');
      wrapper.appendChild(botMsgEl);
      wrapper.appendChild(copyBtn);
      document.getElementById('chat').appendChild(wrapper);

      // POST SSE: token in Authorization header, not in URL
      let fullText = '';
      try {
         const response = await fetch('/api/chat/stream', {
            method: 'POST',
            headers: {
               'Content-Type': 'application/json',
               'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ text })
         });

         if (response.status === 401) {
            // Token expired or invalid — force re-login
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('auth-box').style.display = 'flex';
            document.getElementById('error').innerText = 'Sessão expirada. Faça login novamente.';
            token = null;
            return;
         }

         const reader = response.body.getReader();
         const decoder = new TextDecoder();
         let buffer = '';

         while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
               if (!line.startsWith('data: ')) continue;
               const dataStr = line.slice(6).trim();
               if (!dataStr) continue;

               try {
                  const payload = JSON.parse(dataStr);
                  if (payload.status === 'done') {
                     // Update copy button with full text
                     copyBtn.onclick = async () => {
                        try {
                           await navigator.clipboard.writeText(fullText);
                           copyBtn.innerHTML = '✓';
                           copyBtn.classList.add('copied');
                           setTimeout(() => { copyBtn.innerHTML = '📋'; copyBtn.classList.remove('copied'); }, 1500);
                        } catch { /* fallback */ }
                     };
                  } else if (payload.chunk) {
                     fullText += payload.chunk;
                     botMsgEl.innerHTML = formatMessage(fullText);
                     document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                  } else if (payload.error) {
                     botMsgEl.innerHTML += `<div style="color:var(--error)">[Error: ${payload.error}]</div>`;
                  }
               } catch { /* skip malformed JSON */ }
            }
         }
      } catch (err) {
         botMsgEl.innerHTML += `<div style="color:var(--error)">[Erro de conexão]</div>`;
      }
    }

    async function uploadFile() {
       const fileInput = document.getElementById('file');
       if (!fileInput.files.length) return;
       const file = fileInput.files[0];

       appendMsg(`[Enviando: ${file.name}...]`, 'user');

       const formData = new FormData();
       formData.append('file', file);
       formData.append('text', 'Examine o documento anexado.');

       const botMsgEl = appendMsg('Processando documento...', 'bot');

       const res = await fetch('/api/chat/upload', {
           method: 'POST',
           headers: { 'Authorization': 'Bearer ' + token },
           body: formData
       });
       const data = await res.json();
       botMsgEl.textContent = res.ok ? data.reply : 'Error: ' + data.error;
       fileInput.value = '';
    }

    function showPasswordModal() {
       document.getElementById('pw-current').value = '';
       document.getElementById('pw-new').value = '';
       document.getElementById('pw-confirm').value = '';
       document.getElementById('pw-feedback').textContent = '';
       document.getElementById('pw-modal').style.display = 'flex';
       document.getElementById('pw-current').focus();
    }

    function closePasswordModal() {
       document.getElementById('pw-modal').style.display = 'none';
    }

    async function changePassword() {
       var fb = document.getElementById('pw-feedback');
       var cur = document.getElementById('pw-current').value;
       var nw = document.getElementById('pw-new').value;
       var conf = document.getElementById('pw-confirm').value;

       fb.style.color = 'var(--error)';

       if (!cur || !nw || !conf) {
          fb.textContent = 'Preencha todos os campos.';
          return;
       }
       if (nw !== conf) {
          fb.textContent = 'A nova senha e a confirmacao nao coincidem.';
          return;
       }
       if (nw.length < 6) {
          fb.textContent = 'A nova senha deve ter pelo menos 6 caracteres.';
          return;
       }

       try {
          var res = await fetch('/api/auth/change-password', {
             method: 'POST',
             headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
             },
             body: JSON.stringify({ currentPassword: cur, newPassword: nw })
          });
          var data = await res.json();

          if (res.ok) {
             fb.style.color = 'var(--success)';
             fb.textContent = data.message;
             setTimeout(closePasswordModal, 1500);
          } else {
             fb.textContent = data.error || 'Erro ao alterar senha.';
          }
       } catch (e) {
          fb.textContent = 'Erro de conexao.';
       }
    }

    // Auto-focus password on load
    document.getElementById('password').focus();
  </script>
</body>
</html>
