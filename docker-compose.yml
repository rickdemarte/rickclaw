services:
  rickclaw:
    build: .
    container_name: rickclaw_agent
    hostname: ${LOCK_HOST_ID:-rickclaw_agent}
    restart: unless-stopped
    ports:
      - "${PORT:-3128}:${PORT:-3128}"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./.agents/skills:/app/.agents/skills
      - ./context:/app/context
    healthcheck:
      test: ["CMD", "node", "-e", "const port=process.env.PORT||3128; require('http').get('http://localhost:'+port+'/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - NODE_ENV=production
      - LOCK_HOST_ID=${LOCK_HOST_ID:-rickclaw_agent}
      # Maps host shell variable names → app variable names
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_API_TOKEN}
      - GEMINI_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS}
      - AWS_SECRET_ACCESS_KEY=${AWS_KEY}
